<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FORGE · PROVING GROUND</title>
<meta name="description" content="Michael's 30-day proving ground. Seven numbers. No rewrites.">
<meta name="theme-color" content="#141210">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23141210'/%3E%3Cpath d='M6 21h9l-2.3-4.6H24l4.6-4.6H14l2.3 4.6H8.3z' fill='%23E63B2E'/%3E%3C/svg%3E">
<link href="https://api.fontshare.com/v2/css?f[]=tanker@400&f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <div class="brand">
    <svg class="mark" viewBox="0 0 32 32" width="26" height="26" fill="none" aria-label="FORGE anvil mark">
      <path d="M4 22h10l-2.5-5H24l5-5H12l2.5 5H6.5z" fill="currentColor"/>
    </svg>
    <span class="brand-name">FORGE</span>
  </div>
  <div class="top-right">
    <span class="block-chip" id="week-chip">·</span>
    <button data-theme-toggle aria-label="Switch to light mode"></button>
  </div>
</header>

<main>

  <section class="hero" id="hero">
    <p class="hero-kicker" id="hero-kicker"></p>
    <h1 class="hero-title" id="hero-title">PROVING GROUND</h1>
    <p class="hero-number" id="hero-number"></p>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="built" id="built"></div>
  </section>

  <section class="section" id="scoreboard">
    <h2 class="section-head">The Scoreboard</h2>
    <p class="section-sub">Seven numbers plus the one that judges them all. Fed from Hevy on every sync.</p>
    <div class="grid" id="goals-grid"></div>
  </section>

  <section class="section" id="week">
    <h2 class="section-head">The Week</h2>
    <p class="section-sub" id="week-sub">Anchors repeat every week so the numbers can climb. Menus alternate A and B so no two weeks feel the same.</p>
    <div class="days" id="days"></div>
  </section>

  <section class="section" id="testday">
    <h2 class="section-head">Test Day · <span id="testday-date"></span></h2>
    <ol class="testday-list" id="testday-list"></ol>
    <p class="baseline" id="baseline"></p>
  </section>

  <section class="section" id="deal">
    <h2 class="section-head">The Deal</h2>
    <ol class="deal-list" id="deal-list"></ol>
    <div class="fuel">
      <p class="fuel-line" id="fuel-line"></p>
      <p class="fuel-sub" id="fuel-sub"></p>
    </div>
  </section>

</main>

<footer class="foot">
  <span id="foot-left"></span>
  <span id="foot-right"></span>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
